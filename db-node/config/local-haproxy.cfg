global
    log stdout format raw local0
    maxconn 1024

defaults
    log global
    mode tcp
    option tcplog
    timeout connect 5s
    timeout client 1m
    timeout server 1m

frontend local_primary_write
    bind 0.0.0.0:5000
    default_backend local_primary_backend

frontend local_replica_read
    bind 0.0.0.0:5001
    acl has_replica nbsrv(local_replica_backend) gt 0
    use_backend local_replica_backend if has_replica
    default_backend local_readonly_backend

backend local_primary_backend
    balance first
    option httpchk GET /master
    http-check expect status 200
    default-server inter 3s fall 3 rise 2 on-marked-down shutdown-sessions
    server local_db ${LOCAL_DB_HOST}:6432 check port 8008
    server remote_db ${REMOTE_DB_HOST}:6432 check port 8008

backend local_replica_backend
    balance first
    option httpchk GET /replica
    http-check expect status 200
    default-server inter 3s fall 3 rise 2 on-marked-down shutdown-sessions
    server local_db ${LOCAL_DB_HOST}:6432 check port 8008
    server remote_db ${REMOTE_DB_HOST}:6432 check port 8008

backend local_readonly_backend
    balance first
    option httpchk GET /read-only
    http-check expect status 200
    default-server inter 3s fall 3 rise 2 on-marked-down shutdown-sessions
    server local_db ${LOCAL_DB_HOST}:6432 check port 8008
    server remote_db ${REMOTE_DB_HOST}:6432 check port 8008
