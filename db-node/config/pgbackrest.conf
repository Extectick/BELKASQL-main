[global]
repo1-type=s3
repo1-path=/pgbackrest/${PATRONI_SCOPE}
repo1-s3-bucket=${BACKREST_S3_BUCKET}
repo1-s3-endpoint=${BACKREST_S3_ENDPOINT}
repo1-s3-key=${BACKREST_S3_KEY}
repo1-s3-key-secret=${BACKREST_S3_SECRET}
repo1-s3-region=${BACKREST_S3_REGION}
repo1-s3-port=9000
repo1-s3-uri-style=path
repo1-s3-verify-tls=n
start-fast=y
archive-async=y
compress-type=lz4
compress-level-network=3
process-max=2
archive-push-queue-max=256MB
repo1-retention-full=2
repo1-retention-archive=7
spool-path=/var/lib/pgbackrest/spool
log-level-console=info

[${BACKREST_STANZA}]
pg1-path=/var/lib/postgresql/data/pgdata
pg1-port=5432
